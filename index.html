<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포켓몬 폭탄 배틀 - 나드킹 VS 마그케인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 상대 포켓몬 (마그케인) -->
        <div class="enemy-section">
            <div class="pokemon-info">
                <div class="name">마그케인 ♂ Lv.34</div>
                <div class="health-bar">
                    <div class="health-label">HP</div>
                    <div class="health-container">
                        <div class="health-fill" id="enemy-health"></div>
                    </div>
                    <div class="health-numbers">
                        <span id="enemy-hp-current">67</span>/<span id="enemy-hp-max">92</span>
                    </div>
                </div>
            </div>
            <div class="pokemon-sprite enemy-sprite" id="enemy-pokemon">
                <img src="2.jpg" alt="마그케인" id="enemy-image">
                <div class="explosion" id="explosion"></div>
            </div>
        </div>

        <!-- 내 포켓몬 (나드킹) -->
        <div class="player-section">
            <div class="pokemon-sprite player-sprite" id="player-pokemon">
                <img src="1.PNG" alt="나드킹" id="player-image">
            </div>
            <div class="pokemon-info player-info">
                <div class="name">나드킹 ♂ Lv.33</div>
                <div class="health-bar">
                    <div class="health-label">HP</div>
                    <div class="health-container">
                        <div class="health-fill player-health"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 메뉴 섹션 -->
        <div class="menu-section">
            <div class="menu-container">
                <div class="menu-item" id="fight-btn">
                    ▶ 싸우다
                </div>
                <div class="menu-item disabled">
                    가방
                </div>
                <div class="menu-item disabled">
                    포켓몬
                </div>
                <div class="menu-item disabled">
                    도망치다
                </div>
            </div>
        </div>

        <!-- 공격 이펙트 -->
        <div class="bomb-animation" id="bomb-animation">💣</div>
        
        <!-- 메시지 박스 -->
        <div class="message-box" id="message-box">
            <div id="message-text">나드킹이 마그케인에게 폭탄을 던질 준비가 되었다!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
